<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Xplay</title>
</head>
<style>
    :root {
        --brand-orange: #ff9900;
        --dark-bg: #0a0a0a;
        --glass-bg: rgba(10, 10, 10, 0.8);
        --primary: #ff5e00;
        --primary-hover: #ff7b00;
        --primary-light: rgba(255, 94, 0, 0.2);
        --accent: #ff9100;
        --bg: #050505;
        --surface: #121212;
        --border: #222224;
        --text: #ffffff;
        --text-muted: #8b8b93;
        --radius: 12px;
        --shadow-glow: 0 0 20px rgba(255, 94, 0, 0.2);
        --warning-red: #cc0000;
    }

    body {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased
    }

    #xhub-top-bar {
        position: sticky;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        background-color: var(--dark-bg);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 153, 0, .3);
        padding: 0 30px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-sizing: border-box;
        box-shadow: 0 4px 20px rgba(0, 0, 0, .5)
    }

    .xhub-brand {
        display: flex;
        align-items: center;
        color: #fff;
        font-size: 1.4rem;
        font-weight: 800;
        letter-spacing: -.5px;
        text-transform: uppercase
    }

    .xhub-brand img {
        height: 32px;
        width: auto;
        margin-right: 12px;
        object-fit: contain
    }

    .xhub-brand span {
        color: var(--brand-orange)
    }

    .service-select-wrapper {
        position: relative;
        display: inline-block
    }

    .service-select-wrapper::after {
        content: '▼';
        font-size: .7rem;
        color: var(--brand-orange);
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
        opacity: .8
    }

    #service-dropdown {
        background: #1a1a1a;
        color: #eee;
        border: 1px solid #333;
        padding: 8px 35px 8px 16px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        outline: 0;
        appearance: none;
        transition: all .2s ease-in-out
    }

    #service-dropdown:hover {
        border-color: var(--brand-orange);
        background: #222
    }

    #service-dropdown:focus {
        box-shadow: 0 0 0 2px rgba(255, 153, 0, .4)
    }

    header {
        background: rgb(5 5 5 / .9);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 64px;
        z-index: 999;
        backdrop-filter: blur(10px)
    }

    .header-content {
        max-width: 1400px;
        margin: 0 auto;
        padding: .75rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1.5rem
    }

    .search-container {
        display: flex;
        flex: 1;
        max-width: 800px;
        gap: .5rem
    }

    .search-container input,
    .search-container select {
        padding: .6rem 1rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--text);
        outline: 0;
        font-size: 14px;
        transition: border-color .2s
    }

    .search-container input:focus {
        border-color: var(--primary)
    }

    .search-container input {
        flex: 2
    }

    main {
        max-width: 1400px;
        margin: 0 auto;
        padding: 2rem 1.5rem
    }

    .section-header {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 2rem 0 1.5rem;
        display: flex;
        align-items: center;
        gap: .75rem
    }

    .section-header::before {
        content: "";
        width: 4px;
        height: 24px;
        background: linear-gradient(to bottom, var(--primary), var(--accent));
        border-radius: 2px
    }

    .zones-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 1.5rem
    }

    .zone-item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        cursor: pointer;
        transition: all .3s cubic-bezier(.4, 0, .2, 1);
        position: relative
    }

    .zone-item:hover {
        transform: translateY(-8px);
        border-color: var(--primary);
        box-shadow: var(--shadow-glow)
    }

    .zone-item img {
        width: 100%;
        aspect-ratio: 16/10;
        object-fit: cover
    }

    .zone-badge {
        position: absolute;
        top: 8px;
        right: 8px;
        background: var(--primary);
        font-size: 9px;
        padding: 2px 5px;
        border-radius: 4px;
        font-weight: 700
    }

    .fav-btn {
        position: absolute;
        top: 8px;
        left: 8px;
        background: rgba(0, 0, 0, .6);
        border: none;
        color: #fff;
        padding: 4px;
        border-radius: 6px;
        cursor: pointer;
        z-index: 10
    }

    .fav-btn.active {
        color: var(--primary)
    }

    .zone-name {
        padding: 1rem;
        font-size: 14px;
        font-weight: 600;
        text-align: center
    }

    #zoneViewer {
        position: fixed;
        inset: 0;
        background: var(--bg);
        z-index: 10000;
        display: none;
        flex-direction: column
    }

    .zone-header {
        background: #0a0a0a;
        border-bottom: 1px solid var(--border);
        padding: .8rem 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center
    }

    iframe {
        flex: 1;
        border: none;
        width: 100%;
        background: #000
    }

    .btn-secondary {
        background: #222;
        border: 1px solid var(--border);
        color: #fff;
        padding: .5rem 1rem;
        border-radius: 8px;
        cursor: pointer;
        margin-left: .5rem;
        font-weight: 500
    }

    .hero-section {
        display: flex;
        align-items: center;
        background: linear-gradient(135deg, var(--surface), #1a1a1a);
        border: 1px solid var(--primary-light);
        border-radius: var(--radius);
        padding: 2.5rem;
        margin-bottom: 2rem;
        gap: 2rem;
        box-shadow: var(--shadow-glow)
    }

    .hero-image img {
        width: 150px;
        height: 150px;
        border-radius: var(--radius);
        object-fit: cover;
        box-shadow: 0 8px 16px rgba(0, 0, 0, .5)
    }

    .hero-content h2 {
        margin: 0 0 .5rem 0;
        font-size: 2.5rem;
        color: var(--text)
    }

    .hero-content p {
        color: var(--text-muted);
        margin: 0 0 1.5rem 0;
        font-size: 1.1rem
    }

    .btn-primary {
        background: var(--primary);
        color: #fff;
        padding: .8rem 2.5rem;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        display: inline-block;
        cursor: pointer;
        border: none;
        font-size: 1rem;
        transition: .2s
    }

    .btn-primary:hover {
        background: var(--primary-hover);
        transform: translateY(-2px)
    }

    #ramWarning {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(0, 0, 0, .95);
        align-items: center;
        justify-content: center;
        padding: 2rem
    }

    .warning-card {
        max-width: 500px;
        background: #111;
        padding: 3rem;
        border-radius: 20px;
        border: 1px solid var(--warning-red);
        text-align: center
    }

    .btn-proceed {
        background: var(--warning-red);
        border: none;
        color: #fff;
        padding: .75rem 2rem;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
        margin-top: 1.5rem
    }

    .btn-proceed:hover {
        background: #e60000
    }

    @media (max-width:768px) {
        .header-content {
            flex-direction: column;
            align-items: stretch
        }

        .search-container {
            flex-direction: column
        }

        .hero-section {
            flex-direction: column;
            text-align: center;
            padding: 1.5rem
        }
    }
</style>
<div id="xhub-top-bar">
    <div class="xhub-brand"><img alt="X" src="./Xcloud.png"><span>Store</span></div>
    <div class="service-select-wrapper"><select id="service-dropdown">
            <option value="./games.html">Xplay</option>
            <option value="./movies.html">Xwatch</option>
            <option value="./labs.html">Xlabs</option>
        </select></div>
</div>
<div id="ramWarning">
    <div style="max-width:600px;text-align:center">
        <h1 style="color:#fff;font-size:3rem;margin:0">⚠ HEY YOU! ⚠</h1>
        <p style="color:#fcc;font-size:1.3rem;margin-top:1.5rem">UGS games load <strong style="color:#fff">EVERYTHING</strong> into RAM.
        <p style="color:var(--text-muted)">This WILL cause performance issues on low end hardware</p><button class="btn-proceed" onclick="acknowledgeWarning()">Proceed</button><button class="btn-secondary" onclick="closeWarning()" style="display:block;margin:1rem auto">Go Back</button>
    </div>
</div>
<header>
    <div class="header-content">
        <div class="search-container"><input id="searchBar" placeholder="Search games and apps..."><select id="filterSource">
                <option value="all">All Sources</option>
                <option value="gn-math">gn-math</option>
                <option value="UBX">UBX</option>
                <option value="UGS">UGS</option>
            </select><select id="filterCategory">
                <option value="all">All Categories</option>
            </select></div>
    </div>
</header>
<main id="mainContent">
    <div id="featuredBannerContainer" style="display:none"></div>
    <div id="quickAccessSection" style="display:none">
        <div class="section-header" style="justify-content:flex-start">Quick Access <button onclick="clearRecent()" style="margin-left:auto;font-size:12px;padding:6px 12px;background:var(--surface);color:var(--text-muted);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:.2s">Clear Recent</button></div>
        <div id="quickGrid" class="zones-grid"></div>
    </div>
    <div class="section-header">Library <span id="count" style="color:var(--text-muted);font-size:12px;margin-left:10px"></span></div>
    <div id="container" class="zones-grid">Loading...</div>
</main>
<div id="zoneViewer">
    <div class="zone-header">
        <h2 id="viewName" style="margin:0;font-size:1.1rem"></h2>

    </div><iframe id="zoneFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
</div>
