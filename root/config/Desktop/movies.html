<style>
    :root {
        --brand-orange: #ff9900;
        --dark-bg: #0a0a0a;
        --glass-bg: rgba(10, 10, 10, 0.8)
    }

    #xhub-top-bar {
        position: sticky;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 9999;
        background-color: var(--dark-bg);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 153, 0, .3);
        padding: 0 30px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-sizing: border-box;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        box-shadow: 0 4px 20px rgba(0, 0, 0, .5)
    }

    .xhub-brand {
        display: flex;
        align-items: center;
        color: #fff;
        font-size: 1.4rem;
        font-weight: 800;
        letter-spacing: -.5px;
        text-transform: uppercase
    }

    .xhub-brand img {
        height: 32px;
        width: auto;
        margin-right: 12px;
        object-fit: contain
    }

    .xhub-brand span {
        color: var(--brand-orange)
    }

    .service-select-wrapper {
        position: relative;
        display: inline-block
    }

    .service-select-wrapper::after {
        content: '▼';
        font-size: .7rem;
        color: var(--brand-orange);
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
        opacity: .8
    }

    #service-dropdown {
        background: #1a1a1a;
        color: #eee;
        border: 1px solid #333;
        padding: 8px 35px 8px 16px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        outline: 0;
        appearance: none;
        transition: all .2s ease-in-out
    }

    #service-dropdown:hover {
        border-color: var(--brand-orange);
        background: #222
    }

    #service-dropdown:focus {
        box-shadow: 0 0 0 2px rgba(255, 153, 0, .4)
    }
</style>
<div id="xhub-top-bar">
    <div class="xhub-brand"><img alt="X" src="/logo.png"> <span>Store</span></div>
    <div class="service-select-wrapper"><select id="service-dropdown">
            <option value="./games.html">Xplay
            <option value="./movies.html">Xwatch
            <option value="./labs.html">Xlabs
        </select></div>
</div>
<script>
    ! function() {
        const e = document.getElementById("service-dropdown"),
            t = window.location.pathname.toLowerCase();
        t.includes("/movies") ? e.value = "./movies.html" : t.includes("/labs") ? e.value = "./labs.html" : (e.value = "./games.html"), e.addEventListener("change", function() {
            window.location.href = this.value
        })
    }()
</script>

<style>
    :root {

        --surface: #111111;

        --border: #222;
        --text: #ffffff;
        --text-muted: #888;
        --radius: 12px;
        --font-ui: 'Inter', sans-serif;
        --font-mono: 'JetBrains Mono', monospace;
        --transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        --brand-orange: #ff9900;
        --dark-bg: #0a0a0a
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0
    }

    body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-ui);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden
    }

    #xhub-top-bar {
        position: sticky;
        top: 0;
        left: 0;
        width: 100%;

    }

    #service-dropdown:hover {
        border-color: var(--brand-orange);
        background: #222
    }

    #service-dropdown:focus {
        box-shadow: 0 0 0 2px rgba(255, 153, 0, .4)
    }

    .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        padding: 32px 48px
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px
    }

    .page-title {
        font-size: 2rem;
        font-weight: 800;
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text)
    }

    .page-title span {
        background: var(--primary);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent
    }

    .search-box {
        width: 350px;
        padding: 12px 20px;
        background: var(--bg-sidebar);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: #fff;
        font-size: .95rem;
        outline: 0;
        transition: var(--transition)
    }

    .search-box:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px var(--primary-dim)
    }

    .filters {
        display: flex;
        gap: 16px;
        margin-bottom: 32px
    }

    .filter-select {
        background: var(--bg-sidebar);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 8px 16px;
        border-radius: 6px;
        font-size: .9rem;
        outline: 0;
        cursor: pointer;
        appearance: none;
        min-width: 120px
    }

    .filter-select:hover {
        border-color: #444
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 24px;
        padding-bottom: 40px
    }

    .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        cursor: pointer;
        transition: var(--transition);
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column
    }

    .card:hover {
        transform: translateY(-4px);
        border-color: var(--primary);
        box-shadow: 0 10px 20px rgba(0, 0, 0, .5)
    }

    .card-content {
        position: relative;
        z-index: 2;
        padding: 16px;
        width: 100%
    }

    .card-title {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 6px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis
    }

    .card-meta {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: .85rem;
        color: var(--text-muted);
        font-family: var(--font-mono)
    }

    .card-rating {
        color: #ffb400;
        display: flex;
        align-items: center;
        gap: 4px
    }

    .card-action {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -10%);
        background: var(--primary);
        color: #000;
        padding: 10px 16px;
        border-radius: 8px;
        font-size: .85rem;
        font-weight: 700;
        opacity: 0;
        z-index: 3;
        transition: var(--transition)
    }

    .card:hover .card-action {
        opacity: 1;
        transform: translate(-50%, -50%)
    }

    #toast {
        visibility: hidden;
        min-width: 250px;
        background-color: var(--primary);
        color: #000;
        text-align: center;
        border-radius: 50px;
        padding: 12px;
        position: fixed;
        z-index: 1000;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        font-weight: 600;
        box-shadow: 0 10px 30px rgba(255, 102, 0, .4);
        opacity: 0;
        transition: opacity .3s, bottom .3s
    }

    #toast.show {
        visibility: visible;
        opacity: 1;
        bottom: 50px
    }
</style>

    function setupFilters() {
        const e = [...new Set(DRIVE.map(e => e.year))].sort((e, r) => r - e),
            r = [...new Set(DRIVE.map(e => e.genre))].sort();
        yearFilter.innerHTML = '<option value="all">All Years</option>', e.forEach(e => {
            yearFilter.innerHTML += `<option value="${e}">${e}</option>`
        }), genreFilter.innerHTML = '<option value="all">All Genres</option>', r.forEach(e => {
            genreFilter.innerHTML += `<option value="${e}">${e}</option>`
        })
    }

    function renderLibrary() {
        const e = searchInput.value.toLowerCase(),
            r = yearFilter.value,
            i = genreFilter.value;
        grid.innerHTML = "";
        const o = DRIVE.filter(o => {
            const n = o.name.toLowerCase().includes(e),
                a = "all" === r || o.year === r,
                t = "all" === i || o.genre === i;
            return n && a && t
        });
        0 !== o.length ? o.forEach(e => {
            const r = document.createElement("div");
            r.className = "card", r.onclick = () => copyToClipboard(e.url), r.innerHTML = ` <div class="card-bg"></div><div class="card-action">COPY LINK</div><div class="card-content"><div class="card-title">${e.name}</div><div class="card-meta"><span>${e.year}</span><span class="card-rating">★ ${e.rating}</span></div></div> `, grid.appendChild(r)
        }) : grid.innerHTML = '<div style="color:#555; padding:20px; grid-column: 1 / -1;">No matches found.</div>'
    }
    async function copyToClipboard(e) {
        try {
            await navigator.clipboard.writeText(e), showToast()
        } catch (r) {
            const i = document.createElement("textarea");
            i.value = e, document.body.appendChild(i), i.select(), document.execCommand("Copy"), i.remove(), showToast()
        }
    }

    function showToast() {
        const e = document.getElementById("toast");
        e.className = "show", setTimeout(() => {
            e.className = e.className.replace("show", "")
        }, 3e3)
    }
    searchInput.oninput = renderLibrary, yearFilter.onchange = renderLibrary, genreFilter.onchange = renderLibrary, setupFilters(), renderLibrary(), searchInput.focus()
