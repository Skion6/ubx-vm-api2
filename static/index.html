<script>
    (async function xCloudGhost() {
    // --- CONFIGURATION ---
    const PANIC_KEY = '\\';
    const SAFE_URL = 'https://classroom.google.com';
    const API_ENDPOINT = '/api/create?developer_id=stable';
    const BOOT_DELAY_MS = 3000;

    // 1. Immediate Panic Listener
    window.addEventListener('keydown', (e) => {
        if (e.key === PANIC_KEY) window.location.replace(SAFE_URL);
    });

    try {
        // 2. Provision the VM in the background
        const response = await fetch(API_ENDPOINT);
        const data = await response.json();

        if (!data.url) throw new Error("Provisioning Failed");

        // 3. The 3-Second Wait
        // We use a Promise-based timeout to pause execution
        console.log("XCloud: Initializing... 3s");
        
        await new Promise(resolve => setTimeout(resolve, BOOT_DELAY_MS));

        // 4. Direct Redirect
        // This moves the current tab to the VM URL
        window.location.href = data.url;

    } catch (err) {
        // If it fails, we quietly exit to the safe URL to avoid suspicion
        console.error("XCloud: Error");
        window.location.replace(SAFE_URL);
    }
})();
</script>
