<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Xcloud Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f6f8fa;--card:#fff;--muted:#6b7280;--accent:#0366d6;--danger:#dc2626;--success:#16a34a;--border:#e5e7eb}
    html,body{height:100%;margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:#111}
    .container{max-width:1100px;margin:20px auto;padding:20px}
    .header{display:flex;gap:12px;align-items:center;justify-content:space-between}
    .card{background:var(--card);border:1px solid var(--border);padding:12px;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,0.03)}
    .title{font-size:20px;font-weight:700}
    .small{font-size:0.9em;color:var(--muted)}
    .grid{display:grid;grid-template-columns:1fr 360px;gap:16px;margin-top:14px}
    .table{width:100%;border-collapse:collapse}
    .table th,.table td{border-bottom:1px solid var(--border);padding:8px;text-align:left;font-size:14px}
    .table th{background:#f8fafc;font-weight:600}
    .badge{padding:4px 8px;border-radius:999px;font-size:12px;color:#fff}
    .badge.premium{background:#db2777}.badge.running{background:var(--success)}.badge.stopped{background:#6b7280}
    .actions button{margin-right:6px}
    .btn{padding:6px 10px;border-radius:6px;border:1px solid transparent;cursor:pointer}
    .btn.primary{background:var(--accent);color:#fff}
    .btn.ghost{background:transparent;border-color:var(--border)}
    .btn.danger{background:var(--danger);color:#fff}
    .form-row{display:flex;gap:8px;margin-bottom:8px}
    .input{padding:8px;border:1px solid var(--border);border-radius:6px;flex:1}
    .small-muted{font-size:12px;color:var(--muted)}
    .footer{margin-top:12px;font-size:13px;color:var(--muted)}
    .details{font-family:monospace;font-size:13px;background:#f9fafb;padding:8px;border-radius:6px;border:1px solid var(--border);white-space:pre-wrap;max-height:300px;overflow:auto}
    @media (max-width:920px){.grid{grid-template-columns:1fr}.controls{flex-wrap:wrap}}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <div class="title">Xcloud Admin Dashboard</div>
        <div class="small">Manage VMs — create, list, delete, and inspect containers</div>
      </div>
      <div class="controls">
        <label>Admin password <input id="pwd" type="password" class="input" placeholder="Admin password" style="width:200px;margin-left:8px" /></label>
        <button id="refresh" class="btn ghost">Refresh</button>
        <label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="autorefresh" /> Auto-refresh</label>
        <button id="healthBtn" class="btn">Health</button>
      </div>
    </div>

    <div class="grid">
      <div>
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div><strong>VMs</strong> <span class="small-muted" id="vmCount"></span></div>
            <div style="display:flex;gap:8px;align-items:center">
              <input id="filterDev" class="input" placeholder="Filter by developer id (optional)" style="width:260px" />
              <button id="filterBtn" class="btn">Filter</button>
            </div>
          </div>

          <table class="table" id="vms" style="margin-top:10px">
            <thead>
              <tr><th>ID</th><th>Name</th><th>Dev</th><th>Status</th><th>Port</th><th>CPU</th><th>Premium</th><th>Actions</th></tr>
            </thead>
            <tbody></tbody>
          </table>

          <div class="footer">
            <span id="system"></span> · <span id="lastUpdated"></span>
          </div>
        </div>

        <div class="card" style="margin-top:12px">
          <strong>Last response</strong>
          <pre id="lastResponse" class="details">No requests yet.</pre>
        </div>
      </div>

      <div>
        <div class="card">
          <strong>Create VM</strong>
          <div class="small-muted">Create a VM for a developer (admin/operator)</div>
          <div style="margin-top:8px">
            <div class="form-row"><input id="createDeveloper" class="input" placeholder="developer_id (required)" /></div>
            <div class="form-row"><input id="createSiteLimit" class="input" placeholder="site_limit (default 5)" /></div>
            <div class="form-row"><input id="createDeleteAfter" class="input" placeholder="auto-delete after (minutes, optional)" /></div>
            <div class="form-row"><input id="createPremium" class="input" placeholder="premium code (optional)" /></div>
            <div style="display:flex;gap:8px;margin-top:8px">
              <button id="createBtn" class="btn primary">Create VM</button>
              <button id="openLogs" class="btn ghost">Open Console</button>
            </div>
            <div class="small-muted" style="margin-top:8px">Note: `delete_after` is in minutes; premium VMs won't auto-delete.</div>
          </div>
        </div>

        <div class="card" style="margin-top:12px">
          <strong>Admin Actions</strong>
          <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
            <button id="listAllBtn" class="btn">List VMs (admin)</button>
            <button id="listBtn" class="btn">List VMs (filter)</button>
            <button id="rawBtn" class="btn">Run Custom GET</button>
          </div>

          <div style="margin-top:8px">
            <input id="rawPath" class="input" placeholder="/api/..." />
            <button id="runRaw" class="btn primary" style="margin-top:8px">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);
    const $$ = (s) => document.querySelectorAll(s);

    function getHeaders() {
      const pwd = $('#pwd').value;
      const headers = {};
      if (pwd) headers['X-Admin-Password'] = pwd;
      return headers;
    }

    async function apiGet(path, params={}) {
      const headers = getHeaders();
      let url = path;
      const qs = new URLSearchParams(params).toString();
      if (qs) url += (url.includes('?') ? '&' : '?') + qs;
      const res = await fetch(url, { headers });
      const text = await res.text();
      try {
        const json = JSON.parse(text);
        $('#lastResponse').innerText = JSON.stringify(json, null, 2);
        return { ok: res.ok, status: res.status, json };
      } catch(e) {
        $('#lastResponse').innerText = text;
        return { ok: res.ok, status: res.status, text };
      }
    }

    function showSystem(info) { $('#system').innerText = info || ''; }
    function formatShort(id) { return id ? id.slice(0,12) : ''; }
    function prettyCpu(c) { if (c===null||c===undefined) return '-'; return Number(c).toFixed(2) + '%'; }

    async function loadAdminContainers() {
      const r = await apiGet('/api/admin/containers');
      $('#lastUpdated').innerText = new Date().toLocaleString();
      if (!r.ok) { alert('Failed to load admin containers: ' + r.status); return; }
      const data = r.json;
      showSystem(data.system_cpu !== null ? 'System CPU: ' + data.system_cpu + '%' : '');
      const tbody = document.querySelector('#vms tbody');
      tbody.innerHTML = '';
      const vms = data.vms || [];
      $('#vmCount').innerText = `(${vms.length})`;
      for (const vm of vms) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td title="${vm.id}">${formatShort(vm.id)}</td>
          <td>${vm.name || ''}</td>
          <td>${vm.developer_id || ''}</td>
          <td><span class="badge ${vm.status==='running'?'running':'stopped'}">${vm.status || ''}</span></td>
          <td>${vm.port ? `<a href="http://${location.hostname}:${vm.port}/" target="_blank">${location.hostname}:${vm.port}</a>` : ''}</td>
          <td>${prettyCpu(vm.cpu_percent)}</td>
          <td>${vm.premium ? '<span class="badge premium">Yes</span>' : 'No'}</td>
          <td class="actions">
            <button class="btn" data-id="${vm.id}" data-action="inspect">Details</button>
            <button class="btn" data-id="${vm.id}" data-action="open">Open</button>
            <button class="btn danger" data-id="${vm.id}" data-action="delete">Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      }
      attachRowHandlers();
    }

    function attachRowHandlers() {
      document.querySelectorAll('button[data-action]').forEach(b => {
        b.onclick = async (e) => {
          const id = e.currentTarget.dataset.id;
          const action = e.currentTarget.dataset.action;
          if (action === 'delete') {
            if (!confirm('Delete container ' + id + '?')) return;
            const r = await apiGet('/api/delete/' + id);
            if (!r.ok) alert('Delete failed: ' + r.status);
            else alert('Delete success');
            await refresh();
          } else if (action === 'inspect') {
            const rr = await apiGet('/api/admin/containers');
            if (rr.ok) {
              const vm = rr.json.vms.find(v => v.id === id);
              if (vm) $('#lastResponse').innerText = JSON.stringify(vm, null, 2);
              else $('#lastResponse').innerText = 'Container not found in admin list.';
            }
          } else if (action === 'open') {
            const rr = await apiGet('/api/admin/containers');
            if (rr.ok) {
              const vm = rr.json.vms.find(v => v.id === id);
              if (vm && vm.port) window.open(`http://${location.hostname}:${vm.port}/`, '_blank');
              else alert('No port available for this container.');
            }
          }
        };
      });
    }

    async function listVmsFiltered(developer_id) {
      const params = {};
      if (developer_id) params.developer_id = developer_id;
      const r = await apiGet('/api/list', params);
      if (!r.ok) { alert('Failed to list VMs: ' + r.status); return; }
      const data = r.json;
      showSystem(data.system_cpu !== null ? 'System CPU: ' + data.system_cpu + '%' : '');
      const tbody = document.querySelector('#vms tbody');
      tbody.innerHTML = '';
      const vms = data.vms || [];
      $('#vmCount').innerText = `(${vms.length})`;
      for (const vm of vms) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td title="${vm.id}">${formatShort(vm.id)}</td>
          <td>${vm.name || ''}</td>
          <td>${vm.developer_id || ''}</td>
          <td><span class="badge ${vm.status==='running'?'running':'stopped'}">${vm.status || ''}</span></td>
          <td>${vm.port ? `<a href="http://${location.hostname}:${vm.port}/" target="_blank">${location.hostname}:${vm.port}</a>` : ''}</td>
          <td>-</td>
          <td>${vm.premium ? '<span class="badge premium">Yes</span>' : 'No'}</td>
          <td class="actions">
            <button class="btn" data-id="${vm.id}" data-action="inspect">Details</button>
            <button class="btn" data-id="${vm.id}" data-action="open">Open</button>
            <button class="btn danger" data-id="${vm.id}" data-action="delete">Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      }
      attachRowHandlers();
    }

    async function createVm() {
      const developer_id = $('#createDeveloper').value.trim();
      if (!developer_id) { alert('developer_id required'); return; }
      const site_limit = $('#createSiteLimit').value.trim();
      const delete_after_min = $('#createDeleteAfter').value.trim();
      const premium = $('#createPremium').value.trim();

      const params = { developer_id };
      if (site_limit) params.site_limit = site_limit;
      if (delete_after_min) params.delete_after = parseInt(delete_after_min, 10) * 60;
      if (premium) params.premium = premium;

      const r = await apiGet('/api/create', params);
      if (!r.ok) { alert('Create failed: ' + r.status); return; }
      alert('Create success: ' + (r.json.message || 'OK'));
      await refresh();
    }

    async function healthCheck() {
      const r = await apiGet('/api/health');
      if (!r.ok) alert('Health check failed: ' + r.status);
      else alert('Health: ' + JSON.stringify(r.json));
    }

    async function runRaw() {
      const path = $('#rawPath').value.trim();
      if (!path) { alert('Enter a path'); return; }
      const r = await apiGet(path);
      if (!r.ok) alert('Request failed: ' + r.status);
    }

    async function refresh() {
      const filter = $('#filterDev').value.trim();
      if (filter) await listVmsFiltered(filter);
      else await loadAdminContainers();
    }

    $('#refresh').addEventListener('click', refresh);
    $('#listAllBtn').addEventListener('click', loadAdminContainers);
    $('#filterBtn').addEventListener('click', () => listVmsFiltered($('#filterDev').value.trim()));
    $('#listBtn').addEventListener('click', () => listVmsFiltered($('#filterDev').value.trim()));
    $('#createBtn').addEventListener('click', createVm);
    $('#healthBtn').addEventListener('click', healthCheck);
    $('#runRaw').addEventListener('click', runRaw);

    let autoT = null;
    $('#autorefresh').addEventListener('change', (e) => {
      if (e.target.checked) { autoT = setInterval(refresh, 10000); }
      else { clearInterval(autoT); autoT = null; }
    });

    window.addEventListener('load', refresh);
  </script>
</body>
</html>
