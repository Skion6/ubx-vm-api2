<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBX VM Launcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0d;
            --surface-color: #16161e;
            --primary-color: #ff6b00;
            --primary-hover: #e66000;
            --text-main: #e1e1e6;
            --text-muted: #9494a3;
            --border-color: rgba(255, 107, 0, 0.15);
            --glass-bg: rgba(22, 22, 30, 0.7);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 107, 0, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 107, 0, 0.05) 0%, transparent 40%);
        }

        #ui-container {
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            width: 90%;
            max-width: 440px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--border-color);
            animation: fadeIn 0.8s ease-out;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 64px;
            height: 64px;
            background: var(--primary-color);
            border-radius: 16px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(255, 107, 0, 0.3);
            font-size: 32px;
            color: #000;
            font-weight: 700;
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #status {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--primary-color);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--primary-color);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .info-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 32px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-label {
            color: var(--text-muted);
        }

        .info-value {
            color: var(--text-main);
            font-weight: 600;
            font-family: 'Monaco', 'Consolas', monospace;
        }

        .btn-vm {
            background: var(--primary-color);
            color: #000;
            border: none;
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            display: none;
            border-radius: 14px;
            width: 100%;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(255, 107, 0, 0.2);
        }

        .btn-vm:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(255, 107, 0, 0.3);
        }

        .btn-vm:active {
            transform: translateY(0);
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #details {
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="ui-container">
        <div class="logo">U</div>
        <h2>UBX Cloud</h2>
        <div id="status">Initializing VM sequence...</div>
        
        <div id="details">
            <div class="info-card">
                <div class="info-item">
                    <span class="info-label">Instance ID</span>
                    <span class="info-value" id="val-id">...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Access Port</span>
                    <span class="info-value" id="val-port">...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Session TTL</span>
                    <span class="info-value" id="val-timeout">...</span>
                </div>
            </div>
        </div>

        <a class="btn-vm" href="#" id="redirect-btn">Start Session</a>
    </div>

    <script>
        async function launchVM() {
            const statusText = document.getElementById('status');
            const detailsBox = document.getElementById('details');
            const redirectBtn = document.getElementById('redirect-btn');
            
            try {
                const response = await fetch('https://ec2-18-219-58-159.us-east-2.compute.amazonaws.com/api/create?developer_id=loremgroupusllc&site_limit=999&delete_after=45');
                const data = await response.json();
        
                if (data.status === "success") {
                    statusText.innerHTML = "System Ready";
                    statusText.style.color = "var(--primary-color)";
                    
                    document.getElementById('val-id').innerText = data.container_id.substring(0, 12);
                    document.getElementById('val-port').innerText = data.port;
                    document.getElementById('val-timeout').innerText = data.max_session_minutes + "m";
                    
                    detailsBox.style.display = 'block';
                    
                    redirectBtn.href = data.url;
                    redirectBtn.style.display = 'block';
                    
                    // Automatic redirect after 3 seconds
                    setTimeout(() => { if(window.location.hash !== '#no-redirect') window.location.href = data.url; }, 3000);
                } else {
                    statusText.innerText = "Sequence Aborted";
                    statusText.style.color = "#ff4d4d";
                }
            } catch (error) {
                statusText.innerText = "Connection Failed";
                statusText.style.color = "#ff4d4d";
            }
        }
        
        window.addEventListener('load', launchVM);
    </script>
</body>
</html>
