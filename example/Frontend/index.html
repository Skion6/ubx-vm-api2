<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Classroom</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg-color:#0a0a0d;--surface-color:#16161e;--primary-color:#ff6b00;--primary-hover:#e66000;--text-main:#e1e1e6;--text-muted:#9494a3;--border-color:rgba(255, 107, 0, 0.15);--glass-bg:rgba(22, 22, 30, 0.7);--transition:all .3s cubic-bezier(.4, 0, .2, 1)}*{margin:0;padding:0;box-sizing:border-box}body{background-color:var(--bg-color);color:var(--text-main);font-family:'Outfit',sans-serif;min-height:100vh;overflow-y:auto;padding:40px 20px;background-image:radial-gradient(circle at 20% 30%,rgb(255 107 0 / .05) 0%,transparent 40%),radial-gradient(circle at 80% 70%,rgb(255 107 0 / .05) 0%,transparent 40%)}#ui-container{border:1px solid var(--border-color);padding:40px;border-radius:24px;background:var(--glass-bg);backdrop-filter:blur(12px);width:100%;max-width:440px;margin:0 auto;box-shadow:0 20px 40px rgb(0 0 0 / .4),0 0 0 1px var(--border-color);animation:fadeIn .8s ease-out;text-align:center}@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}.logo{width:64px;height:64px;background:var(--primary-color);border-radius:16px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 16px rgb(255 107 0 / .3);font-size:32px;color:#000;font-weight:700}h2{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px;background:linear-gradient(135deg,#fff 0%,#aaa 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:#fff0}#status{font-size:.95rem;color:var(--text-muted);margin-bottom:32px;display:flex;align-items:center;justify-content:center;gap:8px}#status::before{content:'';width:8px;height:8px;background:var(--primary-color);border-radius:50%;display:inline-block;box-shadow:0 0 8px var(--primary-color);animation:pulse 1.5s infinite}@keyframes pulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.5}100%{transform:scale(1);opacity:1}}.info-card{background:rgb(255 255 255 / .03);border-radius:16px;padding:20px;margin-bottom:32px;text-align:left;border:1px solid rgb(255 255 255 / .05)}.info-item{display:flex;justify-content:space-between;margin-bottom:12px;font-size:.9rem}.info-item:last-child{margin-bottom:0}.info-label{color:var(--text-muted)}.info-value{color:var(--text-main);font-weight:600;font-family:'Monaco','Consolas',monospace}.btn-connect{background:var(--primary-color);color:#000;border:none;padding:16px 32px;font-size:1rem;font-weight:700;text-decoration:none;border-radius:14px;width:100%;cursor:pointer;transition:var(--transition);box-shadow:0 10px 20px rgb(255 107 0 / .2)}.btn-connect:hover{background:var(--primary-hover);transform:translateY(-2px);box-shadow:0 12px 24px rgb(255 107 0 / .3)}.btn-connect:active{transform:translateY(0)}.btn-connect:disabled{opacity:.6;cursor:not-allowed;transform:none}.btn-vm{background:var(--primary-color);color:#000;border:none;padding:16px 32px;font-size:1rem;font-weight:700;text-decoration:none;display:none;border-radius:14px;width:100%;cursor:pointer;transition:var(--transition);box-shadow:0 10px 20px rgb(255 107 0 / .2);margin-bottom:12px}.btn-vm:hover{background:var(--primary-hover);transform:translateY(-2px);box-shadow:0 12px 24px rgb(255 107 0 / .3)}.btn-vm:active{transform:translateY(0)}.loader{width:20px;height:20px;border:2px solid rgb(255 255 255 / .1);border-top:2px solid var(--primary-color);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;margin-right:8px;vertical-align:middle}@keyframes spin{to{transform:rotate(360deg)}}#details{display:none;animation:slideUp .5s ease-out}@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.btn-secondary{background:transparent;border:1px solid var(--primary-color);color:var(--primary-color);padding:16px 32px;font-size:1rem;font-weight:700;text-decoration:none;display:none;border-radius:14px;width:100%;cursor:pointer;transition:var(--transition);margin-top:12px}.btn-secondary:hover{background:var(--primary-color);color:#000}
    </style>
</head>
<body>
    <div id="ui-container">
        <div class="logo">U</div>
        <h2>Xcloud</h2>
        <div id="status">Ready to connect</div>
        
        <div id="details">
            <div class="info-card">
                <div class="info-item">
                    <span class="info-label">Instance ID</span>
                    <span class="info-value" id="val-id">...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Friend Code</span>
                    <span class="info-value" id="val-port">...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Time left</span>
                    <span class="info-value" id="val-timeout">...</span>
                </div>
                <div class="info-item" id="premium-row" style="display: none;">
                    <span class="info-label">Premium</span>
                    <span class="info-value" style="color: var(--primary-color);">✓ Active</span>
                </div>
            </div>
        </div>

        <button class="btn-connect" id="connect-btn" onclick="launchVM()">Connect</button>
        
        <a class="btn-vm" href="#" id="redirect-btn" target="_blank">Open VM</a>
        <button class="btn-secondary" id="backup-btn" onclick="openBackupVM()">Open VM (Backup)</button>

        <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.05);">
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px;">Premium Code (optional)</p>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="premium-code" placeholder="Enter premium code" style="flex: 1; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 10px; padding: 12px; color: #fff; outline: none; font-family: 'Outfit', sans-serif;">
            </div>
        </div>

        <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.05);">
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 16px;">Connect with Friend</p>
            <div style="display: flex; gap: 8px;">
                <input type="number" id="friend-port" placeholder="Enter Port" style="flex: 1; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 10px; padding: 12px; color: #fff; outline: none; font-family: 'Outfit', sans-serif;">
                <button onclick="joinFriend()" style="background: transparent; border: 1px solid var(--primary-color); color: var(--primary-color); padding: 0 20px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: var(--transition);">Join</button>
            </div>
        </div>
    </div>

    <script>
        let vmUrl = '';
        
        const EC2_HOST = 'ec2-18-219-58-159.us-east-2.compute.amazonaws.com';
        
        async function launchVM() {
            const statusText = document.getElementById('status');
            const connectBtn = document.getElementById('connect-btn');
            const detailsBox = document.getElementById('details');
            
            connectBtn.disabled = true;
            connectBtn.innerHTML = '<span class="loader"></span>Connecting...';
            
            try {
                const premiumCode = document.getElementById('premium-code').value.trim();
                let apiUrl = `https://${EC2_HOST}/api/create?developer_id=loremgroupusllc&site_limit=999&delete_after=45`;
                if (premiumCode) {
                    apiUrl += `&premium=${encodeURIComponent(premiumCode)}`;
                }
                const response = await fetch(apiUrl);
                const data = await response.json();
        
                if (data.status === "success") {
                    statusText.innerHTML = "System Ready";
                    statusText.style.color = "var(--primary-color)";
                    
                    document.getElementById('val-id').innerText = data.container_id.substring(0, 12);
                    document.getElementById('val-port').innerText = data.port;
                    document.getElementById('val-timeout').innerText = data.premium ? 'Unlimited' : data.max_session_minutes + "m";
                    
                    if (data.premium) {
                        document.getElementById('premium-row').style.display = 'flex';
                    }
                    
                    detailsBox.style.display = 'block';
                    
                    vmUrl = data.url;
                    document.getElementById('redirect-btn').href = data.url;
                    document.getElementById('redirect-btn').style.display = 'block';
                    document.getElementById('backup-btn').style.display = 'block';
                    connectBtn.style.display = 'none';
                    
                    // Try to open in new tab automatically
                    window.open(data.url, '_blank');
                } else {
                    statusText.innerText = "Sequence Aborted";
                    statusText.style.color = "#ff4d4d";
                    connectBtn.disabled = false;
                    connectBtn.innerHTML = 'Connect';
                }
            } catch (error) {
                statusText.innerText = "Connection Failed";
                statusText.style.color = "#ff4d4d";
                connectBtn.disabled = false;
                connectBtn.innerHTML = 'Connect';
            }
        }
        
        function openBackupVM() {
            if (vmUrl) {
                window.open(vmUrl, '_blank');
            }
        }

        function joinFriend() {
            const port = document.getElementById('friend-port').value;
            if (!port) return alert('Please enter a port number');
            
            const proxyUrl = `http://${EC2_HOST}:${port}/`;
            window.open(proxyUrl, '_blank');
        }
    </script>
    
    <img src="../../root/config/Desktop/Xcloud.png" alt="Xcloud" style="display:block;margin:40px auto 0;max-width:200px;opacity:0.6;">
</body>
</html>
