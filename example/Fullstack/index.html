<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VM Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #4CAF50;
        }
        .subtitle {
            color: #888;
            margin-bottom: 30px;
        }
        .create-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }
        .create-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }
        .create-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .status {
            margin: 20px 0;
            padding: 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
        }
        .status.creating {
            border: 1px solid #ff9800;
        }
        .status.ready {
            border: 1px solid #4CAF50;
        }
        .status.error {
            border: 1px solid #f44336;
        }
        .vm-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
            text-align: left;
        }
        .vm-info-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
        }
        .vm-info-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .vm-info-value {
            font-size: 16px;
            font-family: monospace;
            word-break: break-all;
        }
        .vm-frame-container {
            width: 100%;
            height: 70vh;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #333;
            display: none;
            position: relative;
        }
        .vm-frame-container.active {
            display: block;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .timer-display {
            font-size: 24px;
            font-weight: bold;
            color: #ff9800;
            font-family: monospace;
            margin: 15px 0;
        }
        .timer-display.warning {
            color: #f44336;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .inactivity-note {
            background: rgba(255, 152, 0, 0.1);
            border: 1px solid #ff9800;
            padding: 10px 20px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 14px;
        }
        .back-btn {
            background: transparent;
            color: #888;
            border: 1px solid #444;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            display: none;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        .back-btn.active {
            display: inline-block;
        }
        .error-message {
            color: #f44336;
            margin: 10px 0;
        }
        .spinner-container {
            display: none;
        }
        .spinner-container.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 VM Client</h1>
        <p class="subtitle">Create and access your virtual machine</p>
        
        <button class="create-btn" id="createBtn" onclick="createVM()">
            Create New VM
        </button>
        
        <div class="spinner-container" id="spinner">
            <div class="loading-spinner"></div>
            <p>Creating VM and checking availability...</p>
        </div>
        
        <div class="status" id="status" style="display: none;"></div>
        
        <div class="vm-info" id="vmInfo" style="display: none;"></div>
        
        <div class="timer-display" id="timerDisplay" style="display: none;"></div>
        
        <div class="inactivity-note" id="inactivityNote" style="display: none;">
            ⚠️ <strong>Inactivity Warning:</strong> Your VM will be deleted after 
            <span id="inactivityTimeout">60</span> seconds of inactivity. 
            The session will last for a maximum of <span id="maxSession">60</span> minutes.
        </div>
        
        <div class="vm-frame-container" id="vmFrameContainer">
            <iframe id="vmFrame" allow="fullscreen; clipboard-read; clipboard-write"></iframe>
        </div>
        
        <button class="back-btn" id="backBtn" onclick="goBack()">
            ← Create Another VM
        </button>
    </div>

    <script>
        let currentVmData = null;
        let timerInterval = null;
        
        async function createVM() {
            const createBtn = document.getElementById('createBtn');
            const spinner = document.getElementById('spinner');
            const status = document.getElementById('status');
            const vmInfo = document.getElementById('vmInfo');
            const timerDisplay = document.getElementById('timerDisplay');
            const inactivityNote = document.getElementById('inactivityNote');
            const vmFrameContainer = document.getElementById('vmFrameContainer');
            const backBtn = document.getElementById('backBtn');
            
            // Reset UI
            createBtn.disabled = true;
            status.style.display = 'none';
            vmInfo.style.display = 'none';
            timerDisplay.style.display = 'none';
            inactivityNote.style.display = 'none';
            vmFrameContainer.classList.remove('active');
            backBtn.classList.remove('active');
            
            // Show spinner
            spinner.classList.add('active');
            
            try {
                const response = await fetch('/api/vm');
                const vmData = await response.json();
                currentVmData = vmData;
                
                spinner.classList.remove('active');
                
                if (vmData.status === 'success') {
                    // Show success status
                    status.className = 'status ready';
                    status.innerHTML = `<strong>✓ VM Created Successfully!</strong>`;
                    status.style.display = 'block';
                    
                    // Display VM info
                    const maxSession = vmData.max_session_minutes || 60;
                    const inactivityTimeout = vmData.inactivity_timeout_seconds || 60;
                    
                    document.getElementById('inactivityTimeout').textContent = inactivityTimeout;
                    document.getElementById('maxSession').textContent = maxSession;
                    
                    vmInfo.innerHTML = `
                        <div class="vm-info-item">
                            <div class="vm-info-label">Container ID</div>
                            <div class="vm-info-value">${vmData.container_id}</div>
                        </div>
                        <div class="vm-info-item">
                            <div class="vm-info-label">VM Name</div>
                            <div class="vm-info-value">${vmData.name}</div>
                        </div>
                        <div class="vm-info-item">
                            <div class="vm-info-label">Port</div>
                            <div class="vm-info-value">${vmData.port}</div>
                        </div>
                        <div class="vm-info-item">
                            <div class="vm-info-label">Developer ID</div>
                            <div class="vm-info-value">${vmData.developer_id}</div>
                        </div>
                    `;
                    vmInfo.style.display = 'grid';
                    
                    // Show timer
                    startTimer(maxSession);
                    timerDisplay.style.display = 'block';
                    
                    // Show inactivity note
                    inactivityNote.style.display = 'block';
                    
                    // Iframe the VM URL
                    vmFrameContainer.classList.add('active');
                    document.getElementById('vmFrame').src = vmData.url;
                    
                    // Show back button
                    backBtn.classList.add('active');
                    
                    if (vmData.warning) {
                        status.innerHTML += `<br><small style="color: #ff9800;">${vmData.warning}</small>`;
                    }
                } else {
                    throw new Error(vmData.message || 'Failed to create VM');
                }
                
            } catch (error) {
                spinner.classList.remove('active');
                createBtn.disabled = false;
                
                status.className = 'status error';
                status.innerHTML = `<strong>Error:</strong> ${error.message}`;
                status.style.display = 'block';
            }
        }
        
        function startTimer(maxMinutes) {
            const timerDisplay = document.getElementById('timerDisplay');
            let totalSeconds = maxMinutes * 60;
            
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            
            function updateTimer() {
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                timerDisplay.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                
                // Warning when less than 5 minutes
                if (totalSeconds <= 300) {
                    timerDisplay.classList.add('warning');
                }
                
                if (totalSeconds <= 0) {
                    timerDisplay.textContent = 'EXPIRED';
                    timerDisplay.classList.add('warning');
                    clearInterval(timerInterval);
                    document.getElementById('vmFrame').style.display = 'none';
                }
                
                totalSeconds--;
            }
            
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }
        
        function goBack() {
            const createBtn = document.getElementById('createBtn');
            const status = document.getElementById('status');
            const vmInfo = document.getElementById('vmInfo');
            const timerDisplay = document.getElementById('timerDisplay');
            const inactivityNote = document.getElementById('inactivityNote');
            const vmFrameContainer = document.getElementById('vmFrameContainer');
            const backBtn = document.getElementById('backBtn');
            
            // Clear timer
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            
            // Reset UI
            createBtn.disabled = false;
            status.style.display = 'none';
            vmInfo.style.display = 'none';
            timerDisplay.style.display = 'none';
            timerDisplay.classList.remove('warning');
            inactivityNote.style.display = 'none';
            vmFrameContainer.classList.remove('active');
            backBtn.classList.remove('active');
            
            // Clear iframe
            document.getElementById('vmFrame').src = '';
            document.getElementById('vmFrame').style.display = 'block';
            
            currentVmData = null;
        }
    </script>
</body>
</html>
