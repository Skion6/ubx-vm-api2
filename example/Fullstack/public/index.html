<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Classroom</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
:root{--bg-color:#0a0a0d;--surface-color:#16161e;--primary-color:#ff6b00;--primary-hover:#e66000;--success-color:#00c853;--error-color:#ff5252;--text-main:#e1e1e6;--text-muted:#9494a3;--border-color:rgba(255, 107, 0, 0.15);--glass-bg:rgba(22, 22, 30, 0.7);--transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1)}*{margin:0;padding:0;box-sizing:border-box}body{background-color:var(--bg-color);color:var(--text-main);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px;background-image:radial-gradient(circle at 10% 20%,rgb(255 107 0 / .03) 0%,transparent 40%),radial-gradient(circle at 90% 80%,rgb(255 107 0 / .03) 0%,transparent 40%)}.container{max-width:1000px;width:100%;text-align:center;animation:fadeIn 0.8s ease-out}@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}.header{margin-bottom:48px}h1{font-size:3.5rem;font-weight:800;letter-spacing:-2px;margin-bottom:12px;background:linear-gradient(135deg,#fff 0%,#888 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:#fff0}.subtitle{color:var(--text-muted);font-size:1.1rem;max-width:600px;margin:0 auto}.create-btn{background:var(--primary-color);color:#000;border:none;padding:18px 48px;font-size:1.1rem;font-weight:700;border-radius:16px;cursor:pointer;transition:var(--transition);box-shadow:0 10px 30px rgb(255 107 0 / .2);margin-bottom:40px;display:inline-flex;align-items:center;gap:12px}.create-btn:hover:not(:disabled){background:var(--primary-hover);transform:translateY(-3px);box-shadow:0 15px 40px rgb(255 107 0 / .3)}.create-btn:disabled{opacity:.5;cursor:not-allowed;background:#333;color:#666;box-shadow:none}.spinner-container{display:none;margin:40px 0;color:var(--text-muted)}.spinner-container.active{display:block}.loading-spinner{width:48px;height:48px;border:3px solid rgb(255 107 0 / .1);border-top:3px solid var(--primary-color);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}@keyframes spin{to{transform:rotate(360deg)}}.status{margin:30px 0;padding:20px 32px;border-radius:16px;display:none;font-weight:600;background:var(--glass-bg);border:1px solid var(--border-color);animation:slideUp 0.4s ease-out}.status.ready{color:var(--success-color);border-color:rgb(0 200 83 / .2)}.status.error{color:var(--error-color);border-color:rgb(255 82 82 / .2)}.vm-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin:32px 0;display:none}.vm-card{background:var(--glass-bg);border:1px solid rgb(255 255 255 / .05);padding:24px;border-radius:20px;text-align:left;backdrop-filter:blur(10px);transition:var(--transition)}.vm-card:hover{border-color:var(--border-color);background:rgb(255 107 0 / .03)}.vm-label{font-size:.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px}.vm-value{font-size:1rem;font-weight:600;font-family:'Monaco','Consolas',monospace;color:var(--text-main);word-break:break-all}.vm-frame-container{width:100%;height:75vh;border-radius:24px;overflow:hidden;border:1px solid var(--border-color);display:none;background:#000;box-shadow:0 40px 80px rgb(0 0 0 / .6);margin-top:40px}.vm-frame-container.active{display:block}iframe{width:100%;height:100%;border:none}.timer-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:rgb(255 107 0 / .1);border:1px solid var(--border-color);border-radius:100px;color:var(--primary-color);font-weight:700;font-family:monospace;font-size:1.2rem;margin:20px 0;display:none}.timer-badge.warning{color:var(--error-color);background:rgb(255 82 82 / .1);border-color:rgb(255 82 82 / .2);animation:pulse 1s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}.back-btn{background:#fff0;color:var(--text-muted);border:1px solid rgb(255 255 255 / .1);padding:12px 24px;border-radius:12px;cursor:pointer;margin-top:32px;display:none;transition:var(--transition)}.back-btn:hover{background:rgb(255 255 255 / .05);color:#fff;border-color:rgb(255 255 255 / .2)}.back-btn.active{display:inline-block}@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.warning-note{background:rgb(255 107 0 / .05);border:1px solid var(--border-color);padding:16px 24px;border-radius:16px;margin:24px 0;font-size:.9rem;color:var(--text-muted);display:none}.warning-note strong{color:var(--primary-color)}
    </style>
</head>
<body>
    <div class="container">
        <div class="header" id="mainHeader">
            <h1>Xcloud</h1>
            <p class="subtitle">A fullstack example for Xcloud.</p>
        </div>
        
        <button class="create-btn" id="createBtn" onclick="cr()">
            <span class="plus-icon">+</span> Launch New VM
        </button>

        <div id="premiumSection" style="margin-top: 20px; margin-bottom: 20px; animation: fadeIn 1s ease-out;">
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase;">Premium Code (optional)</p>
            <div style="display: flex; gap: 10px; max-width: 320px; margin: 0 auto; background: var(--glass-bg); padding: 6px; border-radius: 14px; border: 1px solid var(--border-color);">
                <input type="text" id="premiumCode" placeholder="Enter premium code" style="flex: 1; background: transparent; border: none; padding: 10px 14px; color: #fff; outline: none; font-family: 'Outfit', sans-serif; font-size: 0.95rem;">
            </div>
        </div>

        <div id="connectFriendSection" style="margin-top: -20px; margin-bottom: 40px; animation: fadeIn 1s ease-out;">
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase;">Connect with Friend</p>
            <div style="display: flex; gap: 10px; max-width: 320px; margin: 0 auto; background: var(--glass-bg); padding: 6px; border-radius: 14px; border: 1px solid var(--border-color);">
                <input type="number" id="friendPort" placeholder="Port #" style="flex: 1; background: transparent; border: none; padding: 10px 14px; color: #fff; outline: none; font-family: 'Outfit', sans-serif; font-size: 0.95rem;">
                <button onclick="cp()" style="background: var(--primary-color); border: none; color: #000; padding: 0 18px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: var(--transition); font-size: 0.85rem;">Join</button>
            </div>
        </div>
        
        <div class="spinner-container" id="spinner">
            <div class="loading-spinner"></div>
            <p>Deploying VM...</p>
        </div>
        
        <div class="status" id="status"></div>
        
        <div class="vm-grid" id="vmGrid"></div>
        
        <div class="timer-badge" id="timerDisplay"></div>
        
        <div class="warning-note" id="inactivityNote">
            <span><strong>Inactivity Timeout:</strong> Active VM will terminate after <span id="inactivityTimeout">...</span>s of idleness. Max session life: <span id="maxSession">...</span>m.</span>
        </div>
        
        <div class="vm-frame-container" id="vmFrameContainer">
            <iframe id="vmFrame" allow="fullscreen; clipboard-read; clipboard-write"></iframe>
        </div>
        
        <button class="back-btn" id="backBtn" onclick="gb()">
            Back
        </button>
    </div>

    <script>let c=null,t=null;async function cr(){const b=document.getElementById('createBtn'),cs=document.getElementById('connectFriendSection'),sp=document.getElementById('spinner'),st=document.getElementById('status'),vg=document.getElementById('vmGrid'),td=document.getElementById('timerDisplay'),inot=document.getElementById('inactivityNote'),vc=document.getElementById('vmFrameContainer'),bb=document.getElementById('backBtn'),mh=document.getElementById('mainHeader');b.disabled=!0;b.style.opacity='0';cs.style.display='none';setTimeout(()=>b.style.display='none',300);st.style.display='none';vg.style.display='none';td.style.display='none';inot.style.display='none';vc.classList.remove('active');bb.classList.remove('active');sp.classList.add('active');try{const pc=document.getElementById('premiumCode').value.trim();let au='/api/vm';if(pc)au+=`?premium=${encodeURIComponent(pc)}`;const r=await fetch(au),d=await r.json();hd(d)}catch(e){he(e)}}async function cp(){const p=document.getElementById('friendPort').value;if(!p)return alert('Please enter a port number');const b=document.getElementById('createBtn'),cs=document.getElementById('connectFriendSection'),sp=document.getElementById('spinner'),st=document.getElementById('status'),vg=document.getElementById('vmGrid'),td=document.getElementById('timerDisplay'),inot=document.getElementById('inactivityNote'),vc=document.getElementById('vmFrameContainer'),bb=document.getElementById('backBtn'),mh=document.getElementById('mainHeader');b.disabled=!0;b.style.opacity='0';cs.style.display='none';setTimeout(()=>b.style.display='none',300);st.style.display='none';vg.style.display='none';td.style.display='none';inot.style.display='none';vc.classList.remove('active');bb.classList.remove('active');sp.classList.add('active');try{const r=await fetch(`/api/connect/${p}`),d=await r.json();hd(d)}catch(e){he(e)}}function hd(d){const sp=document.getElementById('spinner'),st=document.getElementById('status'),vg=document.getElementById('vmGrid'),td=document.getElementById('timerDisplay'),inot=document.getElementById('inactivityNote'),vc=document.getElementById('vmFrameContainer'),bb=document.getElementById('backBtn'),mh=document.getElementById('mainHeader');c=d;sp.classList.remove('active');if(d.status==='success'){mh.style.display='none';st.className='status ready';st.innerHTML='✓ Instance Online';st.style.display='block';const ip=d.premium||!1;const ms=ip?99999:(d.max_session_minutes||60);const it=ip?'Unlimited':(d.inactivity_timeout_seconds||60);document.getElementById('inactivityTimeout').textContent=it;document.getElementById('maxSession').textContent=ms;vg.innerHTML=`<div class="vm-card"><div class="vm-label">Instance ID</div><div class="vm-value">${d.container_id.substring(0,16)}...</div></div><div class="vm-card"><div class="vm-label">Resource Hub</div><div class="vm-value">${d.name}</div></div><div class="vm-card"><div class="vm-label">Access Port</div><div class="vm-value">${d.port}</div></div>`;vg.style.display='grid';if(ip)vg.innerHTML+=`<div class="vm-card" style="grid-column:1/-1;background:rgba(255,107,0,.1);border:1px solid var(--primary-color)"><div class="vm-label" style="color:var(--primary-color)">★ Premium - No Auto-Delete</div></div>`;if(!ip){tm(ms);td.style.display='inline-flex';inot.style.display='block'}vc.classList.add('active');document.getElementById('vmFrame').src=`/api/vm/${d.container_id}`;bb.classList.add('active')}else{throw new Error(d.message||'Provisioning sequence failed')}}function he(e){const b=document.getElementById('createBtn'),cs=document.getElementById('connectFriendSection'),sp=document.getElementById('spinner'),st=document.getElementById('status');sp.classList.remove('active');b.style.display='inline-flex';cs.style.display='block';setTimeout(()=>b.style.opacity='1',50);b.disabled=!1;st.className='status error';st.innerHTML=`Error: ${e.message}`;st.style.display='block'}function tm(m){const td=document.getElementById('timerDisplay');let ts=m*60;if(t)clearInterval(t);function u(){const m=Math.floor(ts/60),s=ts%60;td.textContent=`${m}:${s<10?'0':''}${s}`;if(ts<=300)td.classList.add('warning');if(ts<=0){td.textContent='SESSION EXPIRED';clearInterval(t);document.getElementById('vmFrame').style.display='none'}ts--}u();t=setInterval(u,1000)}function gb(){location.reload()}</script>
    
    <img src="./Xcloud.png" alt="Xcloud" style="display:block;margin:40px auto 0;max-width:200px;opacity:0.6;">
</body>
</html>
