<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBX Cloud - VM Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0d;
            --surface-color: #16161e;
            --primary-color: #ff6b00;
            --primary-hover: #e66000;
            --success-color: #00c853;
            --error-color: #ff5252;
            --text-main: #e1e1e6;
            --text-muted: #9494a3;
            --border-color: rgba(255, 107, 0, 0.15);
            --glass-bg: rgba(22, 22, 30, 0.7);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 107, 0, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 107, 0, 0.03) 0%, transparent 40%);
        }

        .container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            margin-bottom: 48px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .create-btn {
            background: var(--primary-color);
            color: #000;
            border: none;
            padding: 18px 48px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 30px rgba(255, 107, 0, 0.2);
            margin-bottom: 40px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .create-btn:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 107, 0, 0.3);
        }

        .create-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #333;
            color: #666;
            box-shadow: none;
        }

        .spinner-container {
            display: none;
            margin: 40px 0;
            color: var(--text-muted);
        }

        .spinner-container.active {
            display: block;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255, 107, 0, 0.1);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status {
            margin: 30px 0;
            padding: 20px 32px;
            border-radius: 16px;
            display: none;
            font-weight: 600;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            animation: slideUp 0.4s ease-out;
        }

        .status.ready { color: var(--success-color); border-color: rgba(0, 200, 83, 0.2); }
        .status.error { color: var(--error-color); border-color: rgba(255, 82, 82, 0.2); }

        .vm-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin: 32px 0;
            display: none;
        }

        .vm-card {
            background: var(--glass-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            border-radius: 20px;
            text-align: left;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        .vm-card:hover {
            border-color: var(--border-color);
            background: rgba(255, 107, 0, 0.03);
        }

        .vm-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .vm-value {
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Monaco', 'Consolas', monospace;
            color: var(--text-main);
            word-break: break-all;
        }

        .vm-frame-container {
            width: 100%;
            height: 75vh;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            display: none;
            background: #000;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            margin-top: 40px;
        }

        .vm-frame-container.active {
            display: block;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .timer-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 107, 0, 0.1);
            border: 1px solid var(--border-color);
            border-radius: 100px;
            color: var(--primary-color);
            font-weight: 700;
            font-family: monospace;
            font-size: 1.2rem;
            margin: 20px 0;
            display: none;
        }

        .timer-badge.warning {
            color: var(--error-color);
            background: rgba(255, 82, 82, 0.1);
            border-color: rgba(255, 82, 82, 0.2);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .back-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 32px;
            display: none;
            transition: var(--transition);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .back-btn.active {
            display: inline-block;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .warning-note {
            background: rgba(255, 107, 0, 0.05);
            border: 1px solid var(--border-color);
            padding: 16px 24px;
            border-radius: 16px;
            margin: 24px 0;
            font-size: 0.9rem;
            color: var(--text-muted);
            display: none;
        }

        .warning-note strong { color: var(--primary-color); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header" id="mainHeader">
            <h1>UBX Console</h1>
            <p class="subtitle">Deploy and manage your virtual environments with high-performance edge computing nodes.</p>
        </div>
        
        <button class="create-btn" id="createBtn" onclick="createVM()">
            <span class="plus-icon">+</span> Launch New Instance
        </button>
        
        <div class="spinner-container" id="spinner">
            <div class="loading-spinner"></div>
            <p>Provisioning high-speed container...</p>
        </div>
        
        <div class="status" id="status"></div>
        
        <div class="vm-grid" id="vmGrid"></div>
        
        <div class="timer-badge" id="timerDisplay"></div>
        
        <div class="warning-note" id="inactivityNote">
            <span>⚠️ <strong>Inactivity Protocol:</strong> Active instance will terminate after <span id="inactivityTimeout">...</span>s of idleness. Max session life: <span id="maxSession">...</span>m.</span>
        </div>
        
        <div class="vm-frame-container" id="vmFrameContainer">
            <iframe id="vmFrame" allow="fullscreen; clipboard-read; clipboard-write"></iframe>
        </div>
        
        <button class="back-btn" id="backBtn" onclick="goBack()">
            Terminate & Re-deploy
        </button>
    </div>

    <script>
        let currentVmData = null;
        let timerInterval = null;
        
        async function createVM() {
            const createBtn = document.getElementById('createBtn');
            const spinner = document.getElementById('spinner');
            const status = document.getElementById('status');
            const vmGrid = document.getElementById('vmGrid');
            const timerDisplay = document.getElementById('timerDisplay');
            const inactivityNote = document.getElementById('inactivityNote');
            const vmFrameContainer = document.getElementById('vmFrameContainer');
            const backBtn = document.getElementById('backBtn');
            const mainHeader = document.getElementById('mainHeader');
            
            // UI Transition
            createBtn.disabled = true;
            createBtn.style.opacity = '0';
            setTimeout(() => createBtn.style.display = 'none', 300);
            
            status.style.display = 'none';
            vmGrid.style.display = 'none';
            timerDisplay.style.display = 'none';
            inactivityNote.style.display = 'none';
            vmFrameContainer.classList.remove('active');
            backBtn.classList.remove('active');
            
            spinner.classList.add('active');
            
            try {
                const response = await fetch('/api/vm');
                const vmData = await response.json();
                currentVmData = vmData;
                
                spinner.classList.remove('active');
                
                if (vmData.status === 'success') {
                    mainHeader.style.display = 'none';
                    
                    status.className = 'status ready';
                    status.innerHTML = `✓ Instance Online`;
                    status.style.display = 'block';
                    
                    const maxSession = vmData.max_session_minutes || 60;
                    const inactivityTimeout = vmData.inactivity_timeout_seconds || 60;
                    
                    document.getElementById('inactivityTimeout').textContent = inactivityTimeout;
                    document.getElementById('maxSession').textContent = maxSession;
                    
                    vmGrid.innerHTML = `
                        <div class="vm-card">
                            <div class="vm-label">Instance ID</div>
                            <div class="vm-value">${vmData.container_id.substring(0, 16)}...</div>
                        </div>
                        <div class="vm-card">
                            <div class="vm-label">Resource Hub</div>
                            <div class="vm-value">${vmData.name}</div>
                        </div>
                        <div class="vm-card">
                            <div class="vm-label">Access Port</div>
                            <div class="vm-value">${vmData.port}</div>
                        </div>
                    `;
                    vmGrid.style.display = 'grid';
                    
                    startTimer(maxSession);
                    timerDisplay.style.display = 'inline-flex';
                    inactivityNote.style.display = 'block';
                    
                    vmFrameContainer.classList.add('active');
                    document.getElementById('vmFrame').src = vmData.url;
                    
                    backBtn.classList.add('active');
                } else {
                    throw new Error(vmData.message || 'Provisioning sequence failed');
                }
                
            } catch (error) {
                spinner.classList.remove('active');
                createBtn.style.display = 'inline-flex';
                setTimeout(() => createBtn.style.opacity = '1', 50);
                createBtn.disabled = false;
                
                status.className = 'status error';
                status.innerHTML = `Error: ${error.message}`;
                status.style.display = 'block';
            }
        }
        
        function startTimer(maxMinutes) {
            const timerDisplay = document.getElementById('timerDisplay');
            let totalSeconds = maxMinutes * 60;
            
            if (timerInterval) clearInterval(timerInterval);
            
            function updateTimer() {
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                timerDisplay.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                
                if (totalSeconds <= 300) timerDisplay.classList.add('warning');
                
                if (totalSeconds <= 0) {
                    timerDisplay.textContent = 'SESSION EXPIRED';
                    clearInterval(timerInterval);
                    document.getElementById('vmFrame').style.display = 'none';
                }
                totalSeconds--;
            }
            
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }
        
        function goBack() {
            location.reload(); // Simplest way to reset the complex state
        }
    </script>
</body>
</html>
